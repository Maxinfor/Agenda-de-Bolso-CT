<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão CT Pro</title>
    <style>
        :root { --cons: #2ecc71; --adm: #f1c40f; --veic: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 15px; margin: 0; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filters { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; }
        button { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #3498db; color: white; width: 100%; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .item { padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 6px solid; cursor: pointer; background: #fff; display: flex; justify-content: space-between; }
        .cons-b { border-left-color: var(--cons); }
        .adm-b { border-left-color: var(--adm); }
        .veic-b { border-left-color: var(--veic); }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top:0">Painel de Gestão CT</h2>
        <div class="filters">
            <button onclick="render('todos')">🌐</button>
            <button onclick="render('cons')">👨‍⚖️</button>
            <button onclick="render('adm')">📁</button>
            <button onclick="render('veic')">🚗</button>
        </div>
        <select id="cat">
            <option value="cons">Conselheiro</option>
            <option value="adm">Administrativo</option>
            <option value="veic">Veículo</option>
        </select>
        <input type="text" id="nome" placeholder="Nome ou Item">
        <input type="text" id="obs" placeholder="Detalhes (Ex: Férias, Manutenção)">
        <button class="btn-add" onclick="salvar()">Adicionar Registro</button>
    </div>

    <div id="lista"></div>

    <script>
        function salvar() {
            let data = JSON.parse(localStorage.getItem('db') || '[]');
            data.push({ id: Date.now(), cat: document.getElementById('cat').value, nome: document.getElementById('nome').value, obs: document.getElementById('obs').value });
            localStorage.setItem('db', JSON.stringify(data));
            render('todos');
        }
        function remover(id) {
            let data = JSON.parse(localStorage.getItem('db')).filter(i => i.id !== id);
            localStorage.setItem('db', JSON.stringify(data));
            render('todos');
        }
        function render(cat) {
            let data = JSON.parse(localStorage.getItem('db') || '[]');
            const lista = document.getElementById('lista');
            lista.innerHTML = data.filter(i => cat === 'todos' || i.cat === cat)
                .map(i => `<div class="item ${i.cat}-b" onclick="remover(${i.id})">
                    <div><b>${i.nome}</b><br><small>${i.obs}</small></div>
                    <span style="color:#ccc">✕</span></div>`).join('');
        }
        render('todos');
    </script>
</body>
</html>
