<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CT Pro | Dashboard de Gestão</title>
    <style>
        :root {
            --primary: #10b981; /* Verde esmeralda (Sucesso) */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: #f8fafc; 
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; padding: 20px;
        }
        .container { width: 100%; max-width: 800px; }
        .glass-box { 
            background: var(--glass); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h3 { margin-top: 0; font-weight: 600; letter-spacing: -0.5px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;
        }
        button { 
            padding: 12px; cursor: pointer; border-radius: 12px; border: none; 
            background: var(--primary); color: #064e3b; font-weight: 700; transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }
        .item { 
            background: rgba(255,255,255,0.03); padding: 20px; margin-bottom: 10px; 
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-box">
        <input type="text" id="busca" placeholder="🔍 Pesquisar em todos os registros..." onkeyup="render()">
    </div>

    <div class="glass-box">
        <h3>Gestão CT Pro</h3>
        <div class="grid-form">
            <select id="tipo" onchange="atualizarOpcoes()"></select>
            <select id="nome"></select>
            <select id="motivo" class="full-width"></select>
            <input type="text" id="detalhe" class="full-width" placeholder="Observações...">
            <input type="datetime-local" id="data">
            <button onclick="salvar()">Salvar Registro</button>
        </div>
    </div>

    <div id="lista"></div>
</div>

<script>
    // Configurações mantidas conforme solicitado
    const config = {
        cons: { nomes: ["Claudia", "Lucineia", "Nadelson", "Samara", "Sandra"], motivos: ["Férias", "Plantão", "Palestra", "Reunião"] },
        adm: { nomes: ["Sheila", "Kamilly", "Raquel"], motivos: ["Férias", "Consulta", "Atestado"] },
        limp: { nomes: ["Francinete"], motivos: ["Limpeza Geral", "Manutenção"] },
        veic: { nomes: ["Siena", "Air Cross"], motivos: ["Revisão", "OS"] },
        afast: { nomes: ["Servidor"], motivos: ["Afastamento Político"] }
    };

    function inicializar() {
        document.getElementById('tipo').innerHTML = Object.keys(config).map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('');
        atualizarOpcoes();
        render();
        verificarPrazos();
    }

    function atualizarOpcoes() {
        const t = document.getElementById('tipo').value;
        document.getElementById('nome').innerHTML = config[t].nomes.map(n => `<option value="${n}">${n}</option>`).join('');
        document.getElementById('motivo').innerHTML = config[t].motivos.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function salvar() {
        let db = JSON.parse(localStorage.getItem('ct_db') || '[]');
        db.push({ id: Date.now(), tipo: document.getElementById('tipo').value, nome: document.getElementById('nome').value, motivo: document.getElementById('motivo').value, detalhe: document.getElementById('detalhe').value, data: document.getElementById('data').value });
        localStorage.setItem('ct_db', JSON.stringify(db));
        render();
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('ct_db') || '[]');
        let termo = document.getElementById('busca').value.toLowerCase();
        let filtrados = db.filter(i => 
            i.nome.toLowerCase().includes(termo) || i.tipo.toLowerCase().includes(termo) || 
            i.motivo.toLowerCase().includes(termo) || i.detalhe.toLowerCase().includes(termo) || i.data.includes(termo)
        );

        document.getElementById('lista').innerHTML = filtrados.map(i => `
            <div class="item">
                <div><b>${i.nome}</b><br><small style="opacity:0.7">${i.motivo} | ${i.data.replace('T', ' ')}</small></div>
                <div>
                    <button onclick="editar(${i.id})" style="background:none; color:white;">✏️</button>
                    <button onclick="excluir(${i.id})" style="background:none; color:#fb7185;">✕</button>
                </div>
            </div>
        `).join('');
    }

    function excluir(id) {
        if(confirm("Confirma a exclusão deste registro?")) {
            localStorage.setItem('ct_db', JSON.stringify(JSON.parse(localStorage.getItem('ct_db')).filter(i => i.id !== id)));
            render();
        }
    }

    function editar(id) {
        let db = JSON.parse(localStorage.getItem('ct_db'));
        let item = db.find(i => i.id === id);
        document.getElementById('tipo').value = item.tipo;
        atualizarOpcoes();
        document.getElementById('nome').value = item.nome;
        document.getElementById('motivo').value = item.motivo;
        document.getElementById('detalhe').value = item.detalhe;
        document.getElementById('data').value = item.data;
        excluir(id);
    }

    function verificarPrazos() {
        let db = JSON.parse(localStorage.getItem('ct_db') || '[]');
        let hoje = new Date();
        db.forEach(i => {
            let data = new Date(i.data);
            let diff = Math.ceil((data - hoje) / (1000 * 60 * 60 * 24));
            
            if (i.motivo === "Férias" && (diff === 10 || diff === 5 || diff === 30 || diff === 15)) {
                alert(`Lembrete de Férias: ${i.nome} - Faltam ${diff} dias.`);
            }
            if (i.motivo === "Afastamento Político" && diff > 0 && diff % 15 === 0) {
                alert(`Aviso Político: ${i.nome} - Faltam ${diff} dias.`);
            }
        });
    }

    inicializar();
</script>
</body>
</html>
