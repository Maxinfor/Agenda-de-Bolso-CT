<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Adm - CT</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        .item { padding: 12px; margin-top: 10px; border-radius: 8px; border-left: 6px solid #f1c40f; background: white; display: flex; justify-content: space-between; align-items: center; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>Gestão Administrativa</h3>
    <select id="admNome">
        <option>Sheila</option>
        <option>Kamilly</option>
        <option>Raquel</option>
        <option>Francinete (Limpeza)</option>
    </select>
    
    <select id="tipoMov">
        <option value="Hora Extra">Hora Extra (+)</option>
        <option value="Falta">Falta (-)</option>
        <option value="Devendo Horas">Devendo Horas (-)</option>
        <option value="Abono">Abono (+)</option>
        <option value="Férias">Férias</option>
        <option value="Dias na Casa">Dias na Casa (Contagem)</option>
    </select>
    
    <input type="text" id="qtd" placeholder="Quantidade (ex: 2h, 1 dia, 5 dias)">
    <input type="date" id="data">
    <button onclick="salvar()">Registrar Movimentação</button>
</div>

<div id="lista"></div>

<script>
    function salvar() {
        let db = JSON.parse(localStorage.getItem('adm_db') || '[]');
        db.push({
            id: Date.now(),
            nome: document.getElementById('admNome').value,
            tipo: document.getElementById('tipoMov').value,
            qtd: document.getElementById('qtd').value,
            data: document.getElementById('data').value
        });
        localStorage.setItem('adm_db', JSON.stringify(db));
        render();
    }

    function remover(id) {
        if(confirm("Excluir este registro?")) {
            let db = JSON.parse(localStorage.getItem('adm_db')).filter(i => i.id !== id);
            localStorage.setItem('adm_db', JSON.stringify(db));
            render();
        }
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('adm_db') || '[]');
        document.getElementById('lista').innerHTML = db.map(i => `
            <div class="item" onclick="remover(${i.id})">
                <div><b>${i.nome}</b> | ${i.tipo}<br><small>${i.data} - ${i.qtd}</small></div>
                <span>✕</span>
            </div>
        `).join('');
    }
    render();
</script>
</body>
</html>
