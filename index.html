<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão CT Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-acao { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .item { padding: 12px; margin-top: 10px; border-radius: 8px; border-left: 6px solid #ccc; background: white; }
    </style>
</head>
<body>

<div class="box">
    <h3>Painel Administrativo</h3>
    <select id="tipo" onchange="atualizarOpcoes()">
        <option value="cons">Conselheiro</option>
        <option value="adm">Administrativo</option>
        <option value="limp">Limpeza (Francinete)</option>
        <option value="veic">Veículo</option>
    </select>
    <select id="nome"></select>
    <input type="text" id="motivo" placeholder="Motivo/Ocorrência">
    <input type="text" id="detalhe" placeholder="Local ou Detalhes">
    <input type="datetime-local" id="data">
    <button onclick="salvar()" style="background:#27ae60;">Salvar Registro</button>
    <button onclick="exportarCSV()" style="background:#2980b9; margin-top:5px;">Exportar para Excel (CSV)</button>
</div>

<div id="lista"></div>

<script>
    const config = {
        cons: { nomes: ["Claudia", "Lucineia", "Nadelson", "Samara", "Sandra"], motivos: ["Palestra", "Reunião", "Férias", "Abono", "Atestado"] },
        adm: { nomes: ["Sheila", "Kamilly", "Raquel"], motivos: ["Consulta", "Atestado", "Saída Antecipada", "Hora Extra"] },
        limp: { nomes: ["Francinete"], motivos: ["Limpeza Geral", "Layout", "Manutenção", "Férias"] },
        veic: { nomes: ["Veículo 01", "Veículo 02"], motivos: ["Revisão", "OS", "Abastecimento"] }
    };

    function atualizarOpcoes() {
        const tipo = document.getElementById('tipo').value;
        document.getElementById('nome').innerHTML = config[tipo].nomes.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    function salvar() {
        let db = JSON.parse(localStorage.getItem('ct_db') || '[]');
        db.push({ id: Date.now(), tipo: document.getElementById('tipo').value, nome: document.getElementById('nome').value, motivo: document.getElementById('motivo').value, detalhe: document.getElementById('detalhe').value, data: document.getElementById('data').value });
        localStorage.setItem('ct_db', JSON.stringify(db));
        render();
    }

    function excluir(id) { if(confirm("Excluir?")) { localStorage.setItem('ct_db', JSON.stringify(JSON.parse(localStorage.getItem('ct_db')).filter(i => i.id !== id))); render(); } }

    function exportarCSV() {
        let data = JSON.parse(localStorage.getItem('ct_db'));
        let csv = "Tipo,Nome,Motivo,Detalhe,Data\n" + data.map(i => `${i.tipo},${i.nome},${i.motivo},${i.detalhe},${i.data}`).join("\n");
        let blob = new Blob([csv], {type: 'text/csv'});
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement('a'); a.href = url; a.download = 'registros_ct.csv'; a.click();
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('ct_db') || '[]');
        document.getElementById('lista').innerHTML = db.map(i => `
            <div class="item">
                <div><b>${i.nome}</b> (${i.tipo})<br>📅 ${i.data.replace('T', ' ')}<br>📍 ${i.motivo} - ${i.detalhe}</div>
                <div class="btn-acao"><button onclick="excluir(${i.id})" style="background:#e74c3c;">Excluir</button></div>
            </div>
        `).join('');
    }

    atualizarOpcoes();
    render();
</script>
</body>
</html>
